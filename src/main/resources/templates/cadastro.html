<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${tituloPagina}"></title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/styles/style.css}">
</head>
<body>
<div class="container">
    <div class="logo">
        <img th:src="@{/img/senac-logo.png}" alt="Logo Senac">
    </div>
    <div class="card">
        <h1 th:text="${tituloPagina}"></h1>
        <p th:text="${subTituloPagina}"></p>

        <!-- Mensagem de erro -->
        <div class="erro" th:if="${erro}" th:text="${erro}"></div>

        <form th:action="@{/cadastro}" th:object="${usuarioForm}" method="post">

            <label for="nome">Nome Completo</label>
            <input
                    type="text"
                    id="nome"
                    th:field="*{nome}"
                    placeholder="Digite seu nome"
                    required
            >

            <label for="email">E-mail</label>
            <input
                    type="email"
                    id="email"
                    th:field="*{email}"
                    placeholder="Digite seu e-mail"
                    required
            >

            <label for="senha">Senha</label>
            <div class="input-container">
                <input
                        type="password"
                        id="senha"
                        th:field="*{senha}"
                        placeholder="Digite sua senha"
                        required
                >
                <i class="fa-solid fa-eye-slash toggle-password" onclick="mostrarOcultarSenha(this)"></i>
            </div>


            <label for="confirmar">Confirmar Senha</label>
            <div class="caixa-senha">
                <input
                        type="password"
                        id="confirmar"
                        th:field="*{confirmarSenha}"
                        placeholder="Confirme sua senha"
                        required
                >
                <i class="fa-solid fa-eye-slash" onclick="mostrarOcultarSenha(this)"></i>
            </div>

            <div class="erro1" th:if="${erro1}" th:text="${erro1}"></div>

            <button type="submit">Cadastrar</button>

            <div class="links">
                <a th:href="@{/login}">Já possui uma conta? Entrar</a>
            </div>
        </form>
    </div>
</div>
<script th:src="@{/scripts/script.js}"></script>
</body>
</html>
